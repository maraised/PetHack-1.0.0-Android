plugins {
  id 'com.android.application'
}

android {

  compileSdkVersion 30
  buildToolsVersion "30.0.3"

  defaultConfig {
    minSdkVersion 7
    targetSdkVersion 30
    versionName '5.0.0'
    versionCode 5000
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_7
    targetCompatibility JavaVersion.VERSION_1_7
  }

  lintOptions {
    disable 'MissingClass'
  }

  sourceSets {
    main {
      manifest.srcFile 'AndroidManifest.xml'
      res.srcDirs = ['res']
      assets.srcDirs = ['assets']
      jniLibs.srcDirs = ['libs']
    }
  }
}


git {
  implementation 'https://github.com/JodiJodington/ForkFront-Android.git', {
      name 'com.tbd.forkfront'
      projectPath "lib"
      commit '621999c5c9d00f4808f38d1f650d8b54358c1dbc'
  }
}
