on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install required packages
        run: sudo apt-get install -y gcc-multilib
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
           java-version: '17'
           distribution: 'temurin'
      - name: Setup Android SDK           
        uses: android-actions/setup-android@v3        
        with:
          cmdline-tools-version: 9123335
          packages: 'platforms;android-30 ndk;30.0.14904198 build-tools;37.0.0'
      - name: Configure path to NDK
        run: |
          sed -i -e 's,NDK = .*,NDK = /usr/local/lib/android/sdk/ndk/30.0.14904198,g' sys/android/Makefile.src sys/android/Makefile.top
      - name: fetch lua
        run: |
          cd sys/android && sh ./setup.sh && cd ../..
          make fetch-lua
      - name: Build native Android application
        run: |
          for ABI in arm64-v8a armeabi armeabi-v7a x86 x86_64
          do
            echo "building for $ABI..."
            sed -i -e "s,ABI = .*,ABI = $ABI,g" sys/android/Makefile.src sys/android/Makefile.top
            cd sys/android && sh ./setup.sh && cd ../..
            make install -j$(nproc)
            make spotless
          done
      - name: Build NetHack
        run: cd sys/android && sh gradlew build
      - name: sign release apk
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: |
          echo $KEYSTORE_FILE_BASE64 | base64 -d > keystore.jks
          /usr/local/lib/android/sdk/build-tools/37.0.0/apksigner sign --ks keystore.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --in sys/android/app/build/outputs/apk/release/app-release-unsigned.apk \
            --out sys/android/app/build/outputs/apk/release/app-release.apk

      - uses: actions/upload-artifact@v5
        with:
          name: nethack-release-unsigned
          path: sys/android/app/build/outputs/apk/release/app-release.apk
      - uses: actions/upload-artifact@v5
        with:
          name: nethack-debug
          path: sys/android/app/build/outputs/apk/debug/app-debug.apk 
      - name: Make a release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          generate_release_notes: true
          body: "NOTE: currently releases contain libnethack.so for each ABI. Ideally later we will have seperate APKs for each like most modern apps. All of the releases should be considered beta quality as the changes were massive and I have not been able to test it all on my own."
          files: |
            sys/android/app/build/outputs/apk/release/app-release.apk
            sys/android/app/build/outputs/apk/debug/app-debug.apk
